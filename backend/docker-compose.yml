version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adeel
      POSTGRES_DB: first_website
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adeel
    depends_on:
      - postgres

  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: first_website
      PG_USER: admin
      PG_PASSWORD: adeel
      PORT: 5000
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
